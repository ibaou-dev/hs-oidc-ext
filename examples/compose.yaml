# Example: a fresh Keycloak + an OIDC-protected Hindsight server.
#
# `docker compose -f examples/compose.yaml up -d` brings up:
#   - Keycloak (realm auto-imported) on http://localhost:8280
#   - Hindsight API on http://localhost:8893, control-plane UI on http://localhost:9998
#     with the hs-oidc TenantExtension loaded (the API now requires an OIDC token).
#
# Ports are non-standard to avoid common defaults, but if one is already taken on
# your machine, override it — every host port is an env var:
#     HS_KC_PORT=18280 HS_API_PORT=18893 HS_UI_PORT=19998 docker compose -f examples/compose.yaml up -d
# (HS_KC_PORT also feeds the issuer, so overriding it stays consistent.)
# The extension source is mounted read-only — no PyPI needed for a fresh clone.
# LLM provider = mock (no GPU / no API key) so it runs anywhere.
#
# See examples/README.md for the full walk-through.
name: hs-oidc-example

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: hs-oidc-example-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "127.0.0.1:${HS_KC_PORT:-8280}:8080"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/hindsight-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo ok >&3"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [hsnet]

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hs-oidc-example-hindsight
    user: "1000:1000"
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HS_API_PORT:-8893}:8888"   # API
      - "127.0.0.1:${HS_UI_PORT:-9998}:9999"    # control-plane UI
    environment:
      HOME: /home/hindsight
      HINDSIGHT_API_LLM_PROVIDER: mock
      PYTHONPATH: /ext
      # --- hs-oidc: authenticate every request via Keycloak ---
      HINDSIGHT_API_TENANT_EXTENSION: "hs_oidc.tenant:OIDCTenantExtension"
      # Browser/host mints tokens at localhost:${HS_KC_PORT}, so iss matches that;
      # the container fetches JWKS in-network (issuer/JWKS decoupled).
      HINDSIGHT_API_OIDC_ISSUER: "http://localhost:${HS_KC_PORT:-8280}/realms/hindsight"
      HINDSIGHT_API_OIDC_JWKS_URL: "http://keycloak:8080/realms/hindsight/protocol/openid-connect/certs"
      HINDSIGHT_API_OIDC_AUDIENCE: "hindsight"
      HINDSIGHT_API_OIDC_PROFILE: "keycloak"
      # --- MCP OAuth discovery (lets Claude Code & other MCP hosts log in via browser) ---
      # Serves RFC 9728 metadata at /ext/oauth-protected-resource and points the
      # MCP 401's WWW-Authenticate at it. PUBLIC_URL is how the host reaches this
      # server; RESOURCE is the canonical MCP URL (defaults to {PUBLIC_URL}/mcp).
      HINDSIGHT_API_HTTP_EXTENSION: "hs_oidc.http:OIDCDiscoveryExtension"
      HINDSIGHT_API_OIDC_PUBLIC_URL: "http://localhost:8893"
      # Advertise offline_access so a self-registering MCP host (Claude Code DCR)
      # registers for a refresh token — otherwise its short-lived token expires and
      # the session breaks. This is the scope set the discovery document publishes.
      HINDSIGHT_API_OIDC_SCOPES: "openid profile email offline_access"
      # Users carry tenant=acme; tokens without a tenant claim (e.g. service
      # accounts) fall back to 'main'. KNOWN_TENANTS pre-provisions on boot.
      HINDSIGHT_API_TENANT_KNOWN_TENANTS: "acme,main"
      HINDSIGHT_API_TENANT_DEFAULT_TENANT: "main"
      # The bundled control-plane UI is a separate SPA that calls the (now
      # protected) dataplane with ONE static key, not a user token. Give the
      # extension that key so the UI can browse a fixed schema without prompting
      # for an access key. (Without this, the embedded UI shows "Enter your
      # access key / Missing bearer token".)
      HINDSIGHT_API_TENANT_INTERNAL_API_KEY: "cp-internal-service-key-demo"
      HINDSIGHT_API_TENANT_INTERNAL_SCHEMA: "tenant_acme"
      HINDSIGHT_CP_DATAPLANE_API_KEY: "cp-internal-service-key-demo"
    volumes:
      - ../src/hs_oidc:/ext/hs_oidc:ro
      - hs-pg:/home/hindsight/.pg0
    networks: [hsnet]

volumes:
  hs-pg:

networks:
  hsnet:
